<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KhaaoJi - Food Delivery for Pakistan</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons@latest/tabler-icons.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
      background: #f5f5f5;
      --color-background-primary: #ffffff;
      --color-background-secondary: #f8f8f8;
      --color-background-tertiary: #f5f5f5;
      --color-text-primary: #1a1a1a;
      --color-text-secondary: #666666;
      --color-text-tertiary: #999999;
      --color-border-tertiary: rgba(0, 0, 0, 0.1);
      --color-border-secondary: rgba(0, 0, 0, 0.15);
      --color-border-primary: rgba(0, 0, 0, 0.2);
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --border-radius-md: 8px;
      --border-radius-lg: 12px;
    }
    @media (prefers-color-scheme: dark) {
      body {
        background: #1a1a1a;
        --color-background-primary: #2d2d2d;
        --color-background-secondary: #3d3d3d;
        --color-background-tertiary: #1a1a1a;
        --color-text-primary: #ffffff;
        --color-text-secondary: #b0b0b0;
        --color-text-tertiary: #808080;
        --color-border-tertiary: rgba(255, 255, 255, 0.1);
        --color-border-secondary: rgba(255, 255, 255, 0.15);
        --color-border-primary: rgba(255, 255, 255, 0.2);
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
